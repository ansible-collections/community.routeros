minor_changes:
  - api_modify - add ``modify_not_supported`` flag to ``VersionedAPIData`` to explicitly mark paths that are read-only and cannot be modified; ``api_modify`` now skips the ``sync_list`` backend for such paths (https://github.com/ansible-collections/community.routeros/pull/458).
  - api_info - add support for the ``interface dot1x server active``, ``ip hotspot active``, ``ip ipsec active-peers``, ``ip proxy cache-contents``, ``ip socks connections``, ``user active``, and ``user-manager session`` paths as info-only (read-only) paths (https://github.com/ansible-collections/community.routeros/pull/458).
  - api_info, api_modify - add missing ``numbers`` parameter across numerous existing paths for RouterOS >= 7.15.2 (https://github.com/ansible-collections/community.routeros/pull/458).
